services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  flask:
    build:
      context: .
      dockerfile: ./docker/development/flask/Dockerfile
    volumes:
      - "./server:/var/www"
    ports:
      - "5001:5001"
    command: flask run --host=0.0.0.0
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=mysql

  expo:
    image: node:22-alpine
    volumes:
      - "./client:/var/www"
    working_dir: "/var/www/"
    ports:
      - "8081:8081"
    command: npx expo start --web --host lan
    environment:
      - EXPO_PUBLIC_API_URL=http://localhost:5001

volumes:
  mysql_data: